services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blastradius
      POSTGRES_USER: blastradius
      POSTGRES_PASSWORD: blastradius
    ports:
      # Host port 5433 to avoid clashing with a locally installed Postgres.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blastradius -d blastradius"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: blastradius
      DB_USER: blastradius
      DB_PASSWORD: blastradius
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # JRE image has no curl; bash /dev/tcp works for a liveness TCP probe.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' "]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      # Host port 3001 to avoid clashing with a locally running dev server.
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (not localhost): busybox wget prefers ::1 but the server binds IPv4.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
