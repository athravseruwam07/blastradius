server:
  port: 8080

spring:
  application:
    name: blastradius-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blastradius}
    username: ${DB_USER:blastradius}
    password: ${DB_PASSWORD:blastradius}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health
