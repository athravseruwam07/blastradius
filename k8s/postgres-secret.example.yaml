# Template only — copy to postgres-secret.yaml, fill in real values, and
# apply that instead. postgres-secret.yaml is gitignored; never commit real
# secret values. Must match backend-secret.yaml's DB_PASSWORD.
#
#   cp postgres-secret.example.yaml postgres-secret.yaml
#   # edit postgres-secret.yaml
#   kubectl apply -f postgres-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: blastradius-db-secret
  labels:
    app: blastradius
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
