# Template only. Copy to ../postgres-secret.yaml (one directory up — must
# live directly in k8s/, not here, so `kubectl apply -f k8s/` applies it),
# fill in real values. Must match backend-secret.yaml's DB_PASSWORD. This
# file intentionally lives in k8s/examples/, not k8s/, so `kubectl apply -f
# k8s/` never applies the placeholder version.
#
#   cp examples/postgres-secret.example.yaml postgres-secret.yaml
#   # edit postgres-secret.yaml
#   kubectl apply -f postgres-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: blastradius-db-secret
  labels:
    app: blastradius
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
