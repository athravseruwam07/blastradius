apiVersion: apps/v1
kind: Deployment
metadata:
  name: blastradius-frontend
  labels:
    app: blastradius
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blastradius
      component: frontend
  template:
    metadata:
      labels:
        app: blastradius
        component: frontend
    spec:
      containers:
        - name: frontend
          # Build with NEXT_PUBLIC_API_BASE pointing at the backend NodePort
          # (e.g. http://$(minikube ip):30080) since the browser calls the API directly.
          image: blastradius-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
