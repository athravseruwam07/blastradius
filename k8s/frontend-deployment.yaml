apiVersion: apps/v1
kind: Deployment
metadata:
  name: blastradius-frontend
  labels:
    app: blastradius
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blastradius
      component: frontend
  template:
    metadata:
      labels:
        app: blastradius
        component: frontend
    spec:
      containers:
        - name: frontend
          # For minikube: eval $(minikube docker-env) && docker build, then
          # imagePullPolicy IfNotPresent. For kind: pulled through the local
          # registry (see ../kind-config.yaml, jenkins/README.md).
          image: localhost:5001/blastradius-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: blastradius-frontend-config
          env:
            - name: BLASTRADIUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blastradius-backend-secret
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
